# yaml-language-server: $schema=https://raw.githubusercontent.com/Azure/azure-dev/main/schemas/v1.0/azure.yaml.json

requiredVersions:
    extensions:
        azure.ai.agents: '>=0.1.34-preview'
        azure.ai.routines: '>=1.0.0-beta.1'
name: simple-agent-foundry-hosted-python
metadata:
    template: simple-agent-foundry-hosted-python@1.0.0
services:
    ai-project:
        project: ""
        host: azure.ai.project
        language: ""
        deployments:
            - model:
                format: OpenAI
                name: gpt-5-mini
                version: "2025-08-07"
              name: gpt-5-mini
              sku:
                capacity: 10
                name: GlobalStandard
    daily-repo-digest:
        project: ""
        host: azure.ai.routine
        language: ""
        uses:
            - simple-agent-foundry-hosted-python
        action:
            agent_name: simple-agent-foundry-hosted-python
            input: Create a concise daily repo digest for Azure/azure-functions-host.
            type: invoke_agent_responses_api
        description: Create a daily repo digest at 9 AM Pacific time.
        enabled: true
        triggers:
            default:
                cron_expression: "0 9 * * *"
                time_zone: America/Los_Angeles
                type: schedule
    simple-agent-foundry-hosted-python:
        project: ./
        host: azure.ai.agent
        language: docker
        docker:
            remoteBuild: true
        uses:
            - ai-project
        config:
            startupCommand: uv run --frozen --no-dev python main.py
        container:
            resources:
                cpu: "0.5"
                memory: 1Gi
        description: A simple Agent Framework agent hosted by Microsoft Foundry.
        environmentVariables:
            - name: AZURE_AI_MODEL_DEPLOYMENT_NAME
              value: gpt-5-mini
            - name: GITHUB_REPOSITORY
              value: ${GITHUB_REPOSITORY}
            - name: GITHUB_TOKEN
              value: ${GITHUB_TOKEN}
        kind: hosted
        metadata:
            tags:
                - Agent Framework
                - AI Agent Hosting
                - Azure AI AgentServer
                - Responses Protocol
        name: simple-agent-foundry-hosted-python
        protocols:
            - protocol: responses
              version: 2.0.0
infra:
    provider: microsoft.foundry
